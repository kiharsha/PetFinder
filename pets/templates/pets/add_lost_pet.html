<!DOCTYPE html>
<html>
<head>
    <title>Add Lost Pet</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }
        .container {
            width: 40%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 40px;
            box-shadow: 0 0 10px #ccc;
        }
        button {
            background-color: #333;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Report Lost Pet</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit Lost Pet</button>
    </form>

    <p><a href="/">← Back to Gallery</a></p>
</div>

</body>
</html>
